<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OKF Viewer</title>
<script>
(function () {
  try {
    var t = localStorage.getItem("okf-theme");
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
    document.documentElement.style.colorScheme = t;
  } catch (e) {
    document.documentElement.setAttribute("data-theme", "light");
  }
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
<style>
* { box-sizing: border-box; }

:root,
[data-theme="light"] {
  color-scheme: light;
  --bg: #ffffff;
  --bg-surface: #f6f8fa;
  --bg-hover: #eaeef2;
  --bg-active: #ddf4ff;
  --bg-code: #eff1f3;
  --bg-pre: #f6f8fa;
  --text: #1f2328;
  --text-muted: #656d76;
  --border: #d0d7de;
  --border-subtle: #d8dee4;
  --link: #0969da;
  --link-hover: #0550ae;
  --chip: #6e7781;
  --tag-bg: #ddf4ff;
  --tag-bg-hover: #b6e3ff;
  --focus: #0969da;
  --theme-track: #e4e6e9;
  --theme-thumb: #ffffff;
  --theme-sun: #e6a817;
  --theme-moon: #f0f0f0;
  --theme-track-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
  --theme-thumb-shadow: 0 1px 3px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(0, 0, 0, 0.04);
}

[data-theme="dark"] {
  color-scheme: dark;
  --bg: #1e1e1e;
  --bg-surface: #252525;
  --bg-hover: #2f2f2f;
  --bg-active: #263a53;
  --bg-code: #2d2d2d;
  --bg-pre: #161616;
  --text: #dcddde;
  --text-muted: #98989f;
  --border: #3a3a3a;
  --border-subtle: #333333;
  --link: #6cb6ff;
  --link-hover: #8fc7ff;
  --chip: #7d8590;
  --tag-bg: #1f3a5f;
  --tag-bg-hover: #2a4a73;
  --focus: #6cb6ff;
  --theme-track: #3a3a3a;
  --theme-thumb: #ffffff;
  --theme-sun: #e6a817;
  --theme-moon: #f0f0f0;
  --theme-track-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
  --theme-thumb-shadow: 0 1px 3px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(0, 0, 0, 0.12);
}

html, body {
  margin: 0;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
}
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  flex-shrink: 0;
}
.title strong { font-size: 15px; margin-right: 8px; }
.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.header-link-btn {
  border: 0;
  background: transparent;
  padding: 4px 8px;
  border-radius: 6px;
  font: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
}
.header-link-btn:hover {
  color: var(--link);
  background: var(--bg-hover);
}
.header-link-btn:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 1px;
}
.header-link-btn[aria-expanded="true"] {
  color: var(--link);
  background: var(--bg-active);
}
.muted { color: var(--text-muted); font-size: 12px; }

/* Obsidian-style light/dark switch */
.theme-toggle {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 42px;
  height: 24px;
  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  border-radius: 999px;
}
.theme-toggle:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
}
.theme-toggle-track {
  position: relative;
  display: block;
  width: 42px;
  height: 24px;
  border-radius: 999px;
  background: var(--theme-track);
  box-shadow: var(--theme-track-shadow);
  transition: background 0.2s ease;
}
.theme-toggle-thumb {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--theme-thumb);
  box-shadow: var(--theme-thumb-shadow);
  transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: 1;
}
.theme-toggle-icon {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 12px;
  height: 12px;
  pointer-events: none;
  transition: opacity 0.18s ease;
}
.theme-toggle-sun {
  right: 5px;
  color: var(--theme-sun);
  opacity: 1;
}
.theme-toggle-moon {
  left: 5px;
  color: var(--theme-moon);
  opacity: 0;
}
[data-theme="dark"] .theme-toggle-thumb {
  transform: translateX(18px);
}
[data-theme="dark"] .theme-toggle-sun {
  opacity: 0;
}
[data-theme="dark"] .theme-toggle-moon {
  opacity: 1;
}

.shell {
  display: grid;
  grid-template-columns: minmax(200px, 280px) minmax(0, 1fr) minmax(200px, 280px);
  height: calc(100vh - 45px);
  min-height: 0;
}
.pane { min-height: 0; overflow: auto; }
.nav-pane {
  border-right: 1px solid var(--border);
  background: var(--bg-surface);
  display: flex;
  flex-direction: column;
  padding: 10px;
  gap: 8px;
}
#nav-search {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
}
#nav-search::placeholder {
  color: var(--text-muted);
}
.tree { flex: 1; overflow: auto; font-size: 13px; }
.tree details { margin-left: 0; }
.tree details > summary {
  cursor: pointer;
  list-style: none;
  padding: 3px 6px;
  border-radius: 4px;
  user-select: none;
}
.tree details > summary::-webkit-details-marker { display: none; }
.tree details > summary::before {
  content: "▸";
  display: inline-block;
  width: 1em;
  color: var(--text-muted);
}
.tree details[open] > summary::before { content: "▾"; }
.tree .children { margin-left: 12px; border-left: 1px solid var(--border-subtle); padding-left: 4px; }
.tree .item {
  display: block;
  width: 100%;
  text-align: left;
  border: 0;
  background: transparent;
  padding: 3px 6px;
  border-radius: 4px;
  cursor: pointer;
  font: inherit;
  color: inherit;
}
.tree .item:hover,
.tree details > summary:hover { background: var(--bg-hover); }
.tree .item.active,
.tree details > summary.active { background: var(--bg-active); color: var(--link); font-weight: 600; }
.tree .group-label {
  display: block;
  padding: 6px 6px 2px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  color: var(--text-muted);
}
.tree .item.hidden,
.tree details.hidden { display: none; }

.content-pane {
  padding: 20px 28px 40px;
  background: var(--bg);
}
.content-header { margin-bottom: 16px; }
.content-header h1 {
  margin: 4px 0 6px;
  font-size: 1.6rem;
  font-weight: 600;
  line-height: 1.25;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  background: var(--chip);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.meta { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  display: inline-block;
  padding: 1px 7px;
  border: 0;
  border-radius: 10px;
  background: var(--tag-bg);
  color: var(--link);
  font: inherit;
  font-size: 12px;
  cursor: pointer;
  text-decoration: none;
  line-height: 1.4;
}
button.tag:hover,
.tag:hover {
  background: var(--tag-bg-hover);
  color: var(--link-hover);
}
button.tag:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 1px;
}

/* Tag concept list (content pane when a tag is selected) */
.tag-results {
  list-style: none;
  margin: 0;
  padding: 0;
  max-width: 48rem;
}
.tag-results li {
  margin: 0;
  padding: 12px 0;
  border-bottom: 1px solid var(--border-subtle);
}
.tag-results li:last-child { border-bottom: 0; }
.tag-result-title {
  display: inline;
  border: 0;
  background: transparent;
  padding: 0;
  font: inherit;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--link);
  cursor: pointer;
  text-align: left;
}
.tag-result-title:hover { text-decoration: underline; }
.tag-result-title:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
  border-radius: 2px;
}
.tag-result-type {
  display: inline-block;
  margin-left: 8px;
  vertical-align: middle;
  padding: 1px 6px;
  border-radius: 8px;
  font-size: 10px;
  font-weight: 600;
  color: #fff;
  background: var(--chip);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.tag-result-desc {
  margin: 4px 0 0;
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.45;
}
.tag-results-empty {
  color: var(--text-muted);
  font-size: 14px;
}
.markdown-body {
  line-height: 1.6;
  max-width: 48rem;
}
.markdown-body h1, .markdown-body h2, .markdown-body h3 {
  margin-top: 1.4em;
  margin-bottom: 0.4em;
  font-weight: 600;
  line-height: 1.25;
}
.markdown-body h1 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.markdown-body h2 { font-size: 1.2rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.25em; }
.markdown-body h3 { font-size: 1.05rem; }
.markdown-body p, .markdown-body ul, .markdown-body ol, .markdown-body table { margin: 0.6em 0; }
.markdown-body code {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 85%;
  background: var(--bg-code);
  padding: 0.15em 0.35em;
  border-radius: 4px;
}
.markdown-body pre {
  background: var(--bg-pre);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  overflow: auto;
}
.markdown-body pre code { background: transparent; padding: 0; }
.markdown-body table { border-collapse: collapse; width: 100%; }
.markdown-body th, .markdown-body td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}
.markdown-body th { background: var(--bg-surface); }
.markdown-body a.internal { color: var(--link); text-decoration: none; }
.markdown-body a.internal:hover { text-decoration: underline; }
.markdown-body a.external { color: var(--link); }

#backlinks { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); }
#backlinks h2 { font-size: 1rem; }
#backlinks a { color: var(--link); cursor: pointer; text-decoration: none; }
#backlinks a:hover { text-decoration: underline; }

.right-pane {
  border-left: 1px solid var(--border);
  background: var(--bg-surface);
  display: flex;
  flex-direction: column;
}
.graph-panel {
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  min-height: 0;
}
.graph-panel .panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 8px 12px 0;
  flex-shrink: 0;
}
.graph-panel .panel-header .placeholder-label {
  margin-bottom: 0;
}
.graph-header-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
}
.graph-note { font-size: 11px; white-space: nowrap; }
.graph-icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  padding: 0;
  border: 1px solid transparent;
  border-radius: 6px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  flex-shrink: 0;
}
.graph-icon-btn:hover {
  color: var(--text);
  background: var(--bg-hover);
  border-color: var(--border);
}
.graph-icon-btn:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 1px;
}
.graph3d {
  position: relative;
  height: 260px;
  width: 100%;
  background: #1a1a1a;
  overflow: hidden;
  flex-shrink: 0;
}
/* Avoid inline-canvas baseline gap / CSS stretch that warps spheres into eggs. */
.graph3d canvas,
.tag-cloud canvas {
  display: block;
  vertical-align: top;
}
.graph-labels {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 1;
}
.graph-label {
  position: absolute;
  left: 0;
  top: 0;
  max-width: 120px;
  padding: 1px 3px;
  color: #e8e8e8;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.01em;
  line-height: 1.25;
  white-space: nowrap;
  text-align: center;
  /* Soft halo for contrast without muddy multi-axis blur */
  text-shadow:
    0 0 4px #1a1a1a,
    0 1px 3px rgba(0, 0, 0, 0.9),
    0 0 1px #1a1a1a;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  pointer-events: none;
  user-select: none;
  /* Outer shell: JS sets translate() every frame — do not transition transform here. */
  will-change: transform, color, opacity;
  transition: color 0.2s ease, opacity 0.22s ease;
}
/* Inner text: gradual hover size + downward nudge (JS only positions the shell). */
.graph-label-text {
  display: inline-block;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.01em;
  line-height: 1.25;
  transform: translate3d(0, 0, 0) scale(1);
  transform-origin: top center;
  will-change: transform, font-size;
  transition:
    transform 0.34s cubic-bezier(0.22, 1, 0.36, 1),
    font-size 0.34s cubic-bezier(0.22, 1, 0.36, 1),
    font-weight 0.28s ease,
    letter-spacing 0.28s ease;
}
.graph-label.focused {
  color: #f5f5f5;
}
.graph-label.focused .graph-label-text {
  font-weight: 500;
}
.graph-label.highlighted {
  color: #f2f0ff;
  opacity: 1;
}
.graph-label.highlighted .graph-label-text {
  font-weight: 500;
  /* Neighbors: mild emphasis */
  font-size: 12px;
  transform: translate3d(0, 4px, 0) scale(1.05);
}
.graph-label.hover-root {
  color: #f7f5ff;
  opacity: 1;
  z-index: 2;
}
.graph-label.hover-root .graph-label-text {
  font-weight: 600;
  font-size: 13.5px;
  letter-spacing: 0.015em;
  /* Primary hover: clearer drop + size bump */
  transform: translate3d(0, 10px, 0) scale(1.14);
}
.graph-label.dimmed {
  color: #6a6a70;
  opacity: 0.28;
}
.graph-label.dimmed .graph-label-text {
  font-weight: 400;
  font-size: 11px;
  transform: translate3d(0, 0, 0) scale(1);
}
/* Hide 3d-force-graph default tooltip (we use always-on labels). */
.graph-tooltip,
.scene-tooltip {
  display: none !important;
}

/* Floating expanded graph (Obsidian-style) */
.graph-backdrop {
  position: fixed;
  inset: 0;
  z-index: 900;
  background: rgba(15, 18, 22, 0.55);
  backdrop-filter: blur(2px);
}
body.graph-expanded {
  overflow: hidden;
}
body.graph-expanded .graph-panel {
  position: fixed;
  z-index: 910;
  top: 3vh;
  left: 4vw;
  right: 4vw;
  bottom: 3vh;
  width: auto;
  height: auto;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
  background: #1a1a1a;
  overflow: hidden;
}
body.graph-expanded .graph-panel .panel-header {
  padding: 10px 14px;
  border-bottom: 1px solid #2a2a2a;
  background: #141414;
}
body.graph-expanded .graph-panel .placeholder-label,
body.graph-expanded .graph-note {
  color: #8b949e;
}
body.graph-expanded .graph-icon-btn {
  color: #8b949e;
}
body.graph-expanded .graph-icon-btn:hover {
  color: #e6edf3;
  background: #21262d;
  border-color: #30363d;
}
body.graph-expanded .graph3d {
  flex: 1 1 auto;
  height: auto;
  min-height: 0;
}
body.graph-expanded .graph-label {
  max-width: 200px;
}
body.graph-expanded .graph-label-text {
  font-size: 13px;
}
body.graph-expanded .graph-label.highlighted .graph-label-text {
  font-size: 14px;
  transform: translate3d(0, 5px, 0) scale(1.06);
}
body.graph-expanded .graph-label.hover-root .graph-label-text {
  font-size: 16px;
  transform: translate3d(0, 12px, 0) scale(1.16);
}
body.graph-expanded .graph-label.dimmed .graph-label-text {
  font-size: 13px;
  transform: translate3d(0, 0, 0) scale(1);
}
.graph-icon-btn .icon-collapse { display: none; }
body.graph-expanded .graph-icon-btn .icon-expand { display: none; }
body.graph-expanded .graph-icon-btn .icon-collapse { display: block; }

/* Floating tag cloud panel (header-opened; same chrome as expanded local graph) */
.tag-panel {
  display: none;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
body.tags-expanded {
  overflow: hidden;
}
body.tags-expanded .tag-panel {
  display: flex;
  position: fixed;
  z-index: 910;
  top: 3vh;
  left: 4vw;
  right: 4vw;
  bottom: 3vh;
  width: auto;
  height: auto;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
  background: #1a1a1a;
}
body.tags-expanded .tag-panel .panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid #2a2a2a;
  background: #141414;
  flex-shrink: 0;
}
body.tags-expanded .tag-panel .panel-header .placeholder-label {
  margin-bottom: 0;
  color: #8b949e;
}
body.tags-expanded .tag-panel .graph-note {
  color: #8b949e;
}
body.tags-expanded .tag-panel .graph-icon-btn {
  color: #8b949e;
}
body.tags-expanded .tag-panel .graph-icon-btn:hover {
  color: #e6edf3;
  background: #21262d;
  border-color: #30363d;
}
.tag-cloud {
  position: relative;
  flex: 1 1 auto;
  min-height: 0;
  width: 100%;
  background: #1a1a1a;
  overflow: hidden;
}
.tag-empty {
  margin: 0;
  padding: 48px 16px;
  text-align: center;
  font-size: 14px;
  color: #8b949e;
  flex: 1;
}
.tag-cloud .graph-labels { z-index: 1; }
.tag-cloud .graph-label {
  max-width: 140px;
}
.tag-cloud .graph-label-text {
  font-size: 11px;
}
body.tags-expanded .tag-cloud .graph-label {
  max-width: 180px;
}
body.tags-expanded .tag-cloud .graph-label-text {
  font-size: 12px;
}

.toc-panel {
  flex: 1;
  padding: 12px 14px;
  overflow: auto;
}
.placeholder-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 8px;
}
#toc-list {
  list-style: none;
  margin: 0;
  padding: 0;
}
#toc-list li { margin: 4px 0; }
#toc-list a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 12px;
}
#toc-list a:hover { color: var(--link); }
#toc-list .lvl-2 { padding-left: 10px; }
#toc-list .lvl-3 { padding-left: 20px; }

@media (max-width: 960px) {
  .shell { grid-template-columns: 220px minmax(0, 1fr); }
  .right-pane { display: none; }
  /* Expanded graph is reparented to body; keep it usable on narrow viewports. */
  body.graph-expanded .graph-panel,
  body.tags-expanded .tag-panel {
    top: 2vh;
    left: 2vw;
    right: 2vw;
    bottom: 2vh;
  }
}
@media (max-width: 700px) {
  .shell { grid-template-columns: 1fr; }
  .nav-pane { max-height: 40vh; border-right: 0; border-bottom: 1px solid var(--border); }
}

</style>
</head>
<body>

      "type": "Foreword",
      "title": "Foreword by Thomas J. DiLorenzo",
      "label": "Foreword",
      "description": "Places the essay in the tradition of the Declaration of Independence and warns against modern forms of legal plunder.",
      "tags": [
        "bastiat",
        "foreword",
        "legal-philosophy",
        "the-law"
      ],
      "timestamp": "2026-07-02T12:00:00+00:00",
      "body": "\r\n# Foreword\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nDiLorenzo emphasizes Bastiat's anticipation of rent-seeking and the corruption of education and charity by the state. America came closest to the ideal except for slavery and tariffs.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Government's only legitimate end is protection of life, liberty, and property. (see Natural Rights).\r\n- Legal plunder includes tariffs, subsidies, progressive taxes, public schooling, welfare. (see legal plunder).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n",

      "in": 0,

      "rank": 10

      "type": "Core Principle",
      "title": "Collective Force",
      "label": "Collective Force",
      "description": "Individuals may combine their right of defense into a regular common force.",
      "tags": [

      "timestamp": "2026-07-02T12:00:00+00:00",
      "body": "\r\n# Collective Force\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nIndividuals may combine their right of defense into a regular common force. See the [central definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- The common force inherits exactly the same moral limits as individual force.\r\n- It cannot lawfully be used for plunder. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see legal plunder).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n",

      "timestamp": "2026-07-02T12:00:00+00:00",
      "body": "\r\n# Justice\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nLaw's mission is to cause justice to reign by protecting rights equally. See the [central definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- When law sanctions plunder the distinction between justice and injustice disappears. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see legal plunder).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n",

    {
      "id": "fundamental-principles/law-as-organization-of-defense",
      "slug": "flaw-",
      "type": "Definition",
      "title": "Law as the Organization of Defense",
      "label": "Law Defined as Organized Defense",
      "description": "Law is the substitution of collective force for individual force for the sole purpose of protecting persons, liberties and property.",
      "tags": [
        "bastiat",
        "definition",
        "law",
        "legal-philosophy",
        "the-law"
      ],
      "timestamp": "2026-07-02T12:00:00+00:00",
      "body": "\r\n# Law Defined\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThis is the central thesis. Law has no other legitimate mission. When it goes beyond defense it becomes plunder. This definition is referenced from almost every other concept in the bundle.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Collective force may only do what the individual may lawfully do. (see Natural Rights).\r\n- Results in minimal, just, stable government. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n",
      "path": "fundamental-principles/law-as-organization-of-defense.md",
      "degree": 58,

      "label": "Lawful Defense",

      "timestamp": "2026-07-02T12:00:00+00:00",
      "body": "\r\n# Lawful Defense\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nEvery person has a natural right to defend life, liberty and property. See the [central definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Defense is the origin of legitimate force. (see Natural Rights).\r\n- Collective right derives directly from it. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n",

      "type": "Core Principle",
      "title": "Natural Rights",
      "label": "Natural Rights",
      "description": "Life, liberty and property are God-given and exist prior to any legislation.",

        "bastiat",

      "timestamp": "2026-07-02T12:00:00+00:00",
      "body": "\r\n# Natural Rights\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThese three gifts precede and justify law. Any statute violating them is illegitimate. See how they ground the [definition of law](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Three elements: personality (individuality), liberty, property. (see Natural Rights).\r\n- Legislation must serve them, not create or destroy them. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md). Related consequences appear in the discussion of [rent-seeking behavior](/legal-plunder/consequences/rent-seeking.md). Related consequences appear in the discussion of [modern examples](/modern-relevance/contemporary-plunder.md). Related consequences appear in the discussion of [false philanthropy](/perversion-of-law/false-philanthropy.md).\r\n",

      "body": "\r\n# Non-Aggression\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nForce has not been given us to annihilate the equal rights of others. See the [central definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- This limit applies equally to the state.\r\n- Foundation of limited government. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n",

      "body": "\r\n# Order and Stability\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nA government that only protects produces the most stable and natural social order. See the [central definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- No artificial displacements of capital or population.\r\n- Individuals bear responsibility for success and misfortune. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n",

      "body": "\r\n# Personality, Liberty, and Property\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThe three constitutive elements of man. See the [central definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- They are interdependent extensions of one another.\r\n- Property is the fruit of faculties applied to the world. The opposite occurs through the [causes of perversion](/perversion-of-law/causes-of-perversion.md). (see Natural Rights).\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n",

      "body": "\r\n# France 1850\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nThe immediate setting of the essay.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Bastiat served as a deputy.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md). The roots lie in [the causes of perversion](/perversion-of-law/causes-of-perversion.md).\r\n",

      "body": "\r\n# American Ideal\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nProtection of life, liberty, property.\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Two great exceptions noted: slavery and protectionist tariffs.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md). The roots lie in [the causes of perversion](/perversion-of-law/causes-of-perversion.md).\r\n",

      "body": "\r\n# Exceptions\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nHe would have been horrified by later developments.\r\n\r\nThe ideas here connect directly to [the main essay](/the-law.md), [Natural Rights](/fundamental-principles/natural-rights.md), and the discussion of [legal plunder](/legal-plunder/definition.md).\r\n\r\nThe same principles appear in [The Law](/the-law.md) and are grounded in [Natural Rights](/fundamental-principles/natural-rights.md). The roots lie in [the causes of perversion](/perversion-of-law/causes-of-perversion.md).\r\n",

      "id": "the-law",
      "slug": "t",
      "type": "Essay",
      "title": "The Law",
      "label": "The Law",
      "description": "Bastiat's treatise: law exists to protect natural rights; when turned into plunder it destroys justice and liberty.",
      "tags": [
        "bastiat",
        "essay",
        "legal-philosophy",
        "the-law"
      ],
      "timestamp": "2026-07-02T12:00:00+00:00",
      "body": "\r\n# The Law (1850)\r\n\r\nThese principles are developed in [The Law](/the-law.md) and rest on [Natural Rights](/fundamental-principles/natural-rights.md).\r\nBastiat shows that life, liberty and property precede legislation. The law (see [/fundamental-principles/law-as-organization-of-defense.md](/fundamental-principles/law-as-organization-of-defense.md)) is the organization of the natural right of defense. When perverted (by greed or false philanthropy) it becomes an engine of legal plunder. The remedy is to return law strictly to its defensive sphere. See also the detailed treatment of the [core definition](/fundamental-principles/law-as-organization-of-defense.md).\r\n\r\n## Key Points\r\n\r\nFor the foundational treatment, see [the definition of law](/fundamental-principles/law-as-organization-of-defense.md) and [the proper sphere of law](/true-law/proper-sphere.md).\r\n- Personality, liberty and property are natural and pre-political. (see Natural Rights).\r\n- Law = collective force organized only for protection. (see Natural Rights).\r\n- Perversion turns law into legalized theft benefiting some at expense of others.\r\n- Consequences: moral confusion, politicized society, rent-seeking, impoverishment.\r\n\r\nFor more, see [legal plunder](/legal-plunder/definition.md). Related consequences appear in the discussion of [rent-seeking behavior](/legal-plunder/consequences/rent-seeking.md). Related consequences appear in the discussion of [modern examples](/modern-relevance/contemporary-plunder.md). Related consequences appear in the discussion of [false philanthropy](/perversion-of-law/false-philanthropy.md).\r\n",
      "path": "the-law.md",
      "degree": 85,
      "in": 78,
      "out": 7,

      "rank": 2
