<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OKF Viewer</title>
<script>
(function () {
  try {
    var t = localStorage.getItem("okf-theme");
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
    document.documentElement.style.colorScheme = t;
  } catch (e) {
    document.documentElement.setAttribute("data-theme", "light");
  }
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>
<style>
/*__VIEW_CSS__*/
</style>
</head>
<body>
<header class="app-header">
  <div class="title">
    <strong id="bundle-name"></strong>
    <span class="muted">OKF view</span>
  </div>
  <div class="header-actions">
    <button type="button" id="tags-open-btn" class="header-link-btn" aria-label="Open tags" aria-expanded="false" title="Tags">Tags</button>
    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Switch to dark theme" title="Toggle light/dark theme">
      <span class="theme-toggle-track" aria-hidden="true">
        <svg class="theme-toggle-icon theme-toggle-moon" width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="theme-toggle-icon theme-toggle-sun" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4" fill="currentColor" stroke="none"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <span class="theme-toggle-thumb"></span>
      </span>
    </button>
  </div>
</header>

<main class="shell">
  <aside id="nav-pane" class="pane nav-pane">
    <input id="nav-search" type="search" placeholder="Search…" aria-label="Search navigation">
    <nav id="tree" class="tree" aria-label="Bundle navigation"></nav>
  </aside>

  <section id="content-pane" class="pane content-pane">
    <article id="content">
      <header class="content-header">
        <span id="content-type" class="type-chip" hidden></span>
        <h1 id="content-title"></h1>
        <p id="content-desc" class="muted"></p>
        <div id="content-meta" class="meta"></div>
      </header>
      <div id="content-body" class="markdown-body"></div>
      <section id="backlinks" hidden>
        <h2>Linked from</h2>
        <ul id="backlinks-list"></ul>
      </section>
    </article>
  </section>

  <aside id="right-pane" class="pane right-pane">
    <div id="graph-panel" class="graph-panel">
      <div class="panel-header">
        <span class="placeholder-label muted">Local graph</span>
        <div class="graph-header-actions">
          <span id="graph-note" class="muted graph-note"></span>
          <button type="button" id="graph-expand-btn" class="graph-icon-btn" aria-label="Expand graph" aria-expanded="false" title="Expand graph">
            <svg class="icon-expand" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="15 3 21 3 21 9"></polyline>
              <polyline points="9 21 3 21 3 15"></polyline>
              <line x1="21" y1="3" x2="14" y2="10"></line>
              <line x1="3" y1="21" x2="10" y2="14"></line>
            </svg>
            <svg class="icon-collapse" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="4 14 10 14 10 20"></polyline>
              <polyline points="20 10 14 10 14 4"></polyline>
              <line x1="14" y1="10" x2="21" y2="3"></line>
              <line x1="3" y1="21" x2="10" y2="14"></line>
            </svg>
          </button>
        </div>
      </div>
      <div id="graph3d" class="graph3d" aria-label="Local relationship graph"></div>
    </div>
    <div id="toc" class="toc-panel">
      <div class="placeholder-label muted">On this page</div>
      <ul id="toc-list"></ul>
    </div>
  </aside>
</main>
<div id="graph-backdrop" class="graph-backdrop" hidden></div>
<div id="tag-backdrop" class="graph-backdrop" hidden></div>
<div id="tag-panel" class="tag-panel" hidden>
  <div class="panel-header">
    <span class="placeholder-label muted">Tags</span>
    <div class="graph-header-actions">
      <span id="tag-note" class="muted graph-note"></span>
      <button type="button" id="tag-close-btn" class="graph-icon-btn" aria-label="Close tags" title="Close tags">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>
  <div id="tag-cloud" class="tag-cloud" aria-label="Tag co-occurrence graph"></div>
  <p id="tag-empty" class="tag-empty muted" hidden>No tags in this bundle</p>
</div>

<script>
window.BUNDLE_NAME = __BUNDLE_NAME__;
window.GRAPH = __GRAPH_DATA__;
</script>
<script>
/*__VIEW_JS__*/
</script>
</body>
</html>
